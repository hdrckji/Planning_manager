<svg viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg" aria-label="Famiflora">
  <!-- 4 outer dark-green petals at ±45° / ±135° -->
  <path fill="#1A5228" transform="translate(100,105) rotate(-45)"  d="M0,0 C28,-16,32,-50,0,-68 C-32,-50,-28,-16,0,0 Z"/>
  <path fill="#1A5228" transform="translate(100,105) rotate(45)"   d="M0,0 C28,-16,32,-50,0,-68 C-32,-50,-28,-16,0,0 Z"/>
  <path fill="#1A5228" transform="translate(100,105) rotate(135)"  d="M0,0 C28,-16,32,-50,0,-68 C-32,-50,-28,-16,0,0 Z"/>
  <path fill="#1A5228" transform="translate(100,105) rotate(-135)" d="M0,0 C28,-16,32,-50,0,-68 C-32,-50,-28,-16,0,0 Z"/>

  <!-- 4 inner bright-green petals, each rotated ~20° toward the vertical axis -->
  <path fill="#6CC230" transform="translate(100,105) rotate(-22)"  d="M0,0 C18,-12,20,-38,0,-54 C-20,-38,-18,-12,0,0 Z"/>
  <path fill="#6CC230" transform="translate(100,105) rotate(22)"   d="M0,0 C18,-12,20,-38,0,-54 C-20,-38,-18,-12,0,0 Z"/>
  <path fill="#6CC230" transform="translate(100,105) rotate(158)"  d="M0,0 C18,-12,20,-38,0,-54 C-20,-38,-18,-12,0,0 Z"/>
  <path fill="#6CC230" transform="translate(100,105) rotate(-158)" d="M0,0 C18,-12,20,-38,0,-54 C-20,-38,-18,-12,0,0 Z"/>

  <!-- wordmark -->
  <text x="100" y="208" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="27" font-weight="700" fill="#1A5228" letter-spacing="-0.3">famiflora</text>
</svg>
