<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow Desk - Espace Collaborateur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="collaborator">
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Famiflora</p>
          <h1>Flow Desk</h1>
          <p class="hero-text" data-i18n="page.collab.hero">
            Espace planning pour consulter les taches attribuees et suivre
            l'avancement quotidien.
          </p>
        </div>

        <div class="hero-panel card" style="display:none">
          <select id="currentUser" style="display:none"></select>
          <span id="currentRoleBadge" class="badge" style="display:none"></span>
          <span id="currentTeamBadge" class="badge badge-muted" style="display:none"></span>
        </div>
      </header>

      <main class="layout layout-single">
        <section class="main-column" style="grid-column:1/-1">
          <section class="card">
            <section id="mainView" class="view-panel"></section>
          </section>
        </section>
      </main>
    </div>

    <template id="ticketCardTemplate">
      <article class="ticket-card card">
        <div class="ticket-head">
          <div>
            <div class="ticket-meta-row">
              <span class="badge badge-team"></span>
              <span class="badge badge-priority"></span>
              <span class="badge badge-status"></span>
            </div>
            <h3 class="ticket-title"></h3>
          </div>
          <span class="ticket-code"></span>
        </div>

        <p class="ticket-description"></p>

        <dl class="ticket-details"></dl>

        <div class="ticket-photo-wrap hidden">
          <p class="detail-label">Photo</p>
          <img class="ticket-photo" alt="Illustration de la demande" />
        </div>

        <div class="ticket-actions"></div>
      </article>
    </template>

    <script src="i18n.js"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
