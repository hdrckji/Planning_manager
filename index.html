<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FamiTask · Connexion</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FamiTask" />
    <link rel="apple-touch-icon" href="/assets/icon-192.png" />
    <meta name="theme-color" content="#1a5228" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --green:      #2a7a3b;
        --green-dark: #1a5228;
        --gold:       #d4820a;
        --text:       #1a2e1f;
        --muted:      #4d6b55;
        --bg:         #f3f8f1;
        --radius:     20px;
      }

      html, body {
        margin: 0;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
        color: var(--text);
      }

      body {
        background:
          radial-gradient(ellipse 60% 40% at 15% 0%,  rgba(42,122,59,.13)  0%, transparent 60%),
          radial-gradient(ellipse 50% 35% at 88% 5%,  rgba(212,130,10,.15) 0%, transparent 55%),
          #f3f8f1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px 16px;
      }

      /* ── Page layout ──────────────────────────────────────────────────────── */
      .login-page {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      /* ── Header ───────────────────────────────────────────────────────────── */
      .login-header {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .login-logo {
        height: 80px;
        width: auto;
      }

      .login-title {
        font-family: "Fraunces", serif;
        font-size: clamp(2rem, 8vw, 2.6rem);
        font-weight: 700;
        margin: 0;
        line-height: 1;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .login-title em {
        font-style: italic;
        color: var(--green);
      }

      .login-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--green-dark);
        background: rgba(42,122,59,.1);
        border: 1px solid rgba(42,122,59,.18);
        border-radius: 999px;
        padding: 4px 14px;
      }

      .login-badge::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
      }

      /* ── Card ─────────────────────────────────────────────────────────────── */
      .login-card {
        width: 100%;
        background: #fff;
        border-radius: var(--radius);
        border: 1px solid rgba(0,0,0,.07);
        box-shadow: 0 4px 32px rgba(0,0,0,.08);
        padding: 32px 28px;
      }

      .login-card__heading {
        font-family: "Fraunces", serif;
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 6px;
        color: var(--text);
      }

      .login-card__sub {
        font-size: 0.88rem;
        color: var(--muted);
        margin: 0 0 24px;
        line-height: 1.55;
      }

      /* ── Form ─────────────────────────────────────────────────────────────── */
      .login-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-field label {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--green-dark);
      }

      .form-field input {
        width: 100%;
        border: 1.5px solid rgba(0,0,0,.12);
        border-radius: 12px;
        padding: 12px 14px;
        font: inherit;
        font-size: 1rem;
        color: var(--text);
        background: #fafcfa;
        transition: border-color 150ms ease, box-shadow 150ms ease;
        outline: none;
      }

      .form-field input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(42,122,59,.12);
        background: #fff;
      }

      /* ── Error message ────────────────────────────────────────────────────── */
      .login-error {
        font-size: 0.85rem;
        color: #c0392b;
        background: rgba(192,57,43,.08);
        border: 1px solid rgba(192,57,43,.18);
        border-radius: 10px;
        padding: 10px 14px;
        margin: 0;
        display: none;
      }

      .login-error.visible { display: block; }

      /* ── Submit button ────────────────────────────────────────────────────── */
      .login-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px;
        font: inherit;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        background: linear-gradient(135deg, var(--green), var(--green-dark));
        color: #fff;
        letter-spacing: 0.02em;
        transition: opacity 180ms ease, transform 180ms ease;
        margin-top: 4px;
      }

      .login-btn:hover { opacity: 0.92; }
      .login-btn:active { transform: scale(0.98); }
      .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

      /* ── Loading spinner inside button ───────────────────────────────────── */
      .login-btn.loading::after {
        content: "";
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-left: 10px;
        vertical-align: middle;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Footer ───────────────────────────────────────────────────────────── */
      .login-footer {
        font-size: 0.75rem;
        color: var(--muted);
        opacity: 0.7;
        text-align: center;
      }

      /* ── Responsive ───────────────────────────────────────────────────────── */
      @media (max-width: 480px) {
        body { padding: 20px 12px; }

        .login-logo { height: 64px; }

        .login-card {
          padding: 24px 20px;
          border-radius: 18px;
        }

        .form-field input { font-size: 16px; /* évite le zoom iOS */ }
      }
    </style>
  </head>
  <body>

    <div class="login-page">

      <header class="login-header">
        <img src="assets/logo.png" alt="FamiTask" class="login-logo" />
        <h1 class="login-title">Fami<em>Task</em></h1>
        <span class="login-badge">Famiflora</span>
      </header>

      <div class="login-card">
        <h2 class="login-card__heading">Connexion</h2>
        <p class="login-card__sub">Entrez vos identifiants pour accéder à votre espace.</p>

        <form class="login-form" id="loginForm" novalidate>
          <div class="form-field">
            <label for="loginInput">Identifiant</label>
            <input
              id="loginInput"
              type="text"
              autocomplete="username"
              placeholder="Votre identifiant"
              required
              autofocus
            />
          </div>

          <div class="form-field">
            <label for="passwordInput">Mot de passe</label>
            <input
              id="passwordInput"
              type="password"
              autocomplete="current-password"
              placeholder="Mot de passe"
            />
          </div>

          <p class="login-error" id="loginError">Identifiant ou mot de passe incorrect.</p>

          <button type="submit" class="login-btn" id="loginBtn">Se connecter</button>
        </form>
      </div>

      <footer class="login-footer">
        FamiTask &mdash; Usage interne Famiflora &nbsp;&middot;&nbsp; <span id="yr"></span>
      </footer>

    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script>
      document.getElementById("yr").textContent = new Date().getFullYear();

      const ROLE_PATHS = {
        employee:     "employee.html",
        manager:      "manager.html",
        collaborator: "collaborator.html",
      };

      // Si déjà connecté, rediriger directement vers la bonne page
      (function checkExistingSession() {
        try {
          const raw  = localStorage.getItem("flowdesk-session");
          const sess = raw ? JSON.parse(raw) : null;
          if (sess && sess.role && ROLE_PATHS[sess.role]) {
            window.location.replace(ROLE_PATHS[sess.role]);
          }
        } catch {}
      })();

      const form     = document.getElementById("loginForm");
      const btn      = document.getElementById("loginBtn");
      const errorBox = document.getElementById("loginError");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const loginVal = document.getElementById("loginInput").value.trim();
        const passVal  = document.getElementById("passwordInput").value;

        errorBox.classList.remove("visible");
        btn.disabled = true;
        btn.classList.add("loading");
        btn.textContent = "Connexion en cours";

        // Attendre que FlowDeskApi ait chargé les données
        await window.FlowDeskApi?.ready?.();

        const role = await window.FlowDeskAuth.login(loginVal, passVal);

        btn.disabled = false;
        btn.classList.remove("loading");
        btn.textContent = "Se connecter";

        if (role && ROLE_PATHS[role]) {
          window.location.replace(ROLE_PATHS[role]);
        } else {
          errorBox.classList.add("visible");
          document.getElementById("passwordInput").value = "";
          document.getElementById("loginInput").focus();
        }
      });
    </script>
  </body>
</html>
